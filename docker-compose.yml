services:
  # ==================== MariaDB 数据库 ====================
  mariadb:
    image: mariadb:10.11
    container_name: island-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: island_root_2024
      MYSQL_DATABASE: island_campus
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/conf:/etc/mysql/conf.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pisland_root_2024"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存/消息 ====================
  redis:
    image: redis:7.2-alpine
    container_name: island-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Spring Boot 后端 ====================
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: island-backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/island_campus?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: island_root_2024
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: island-campus-jwt-secret-key-2024-super-long-secret-for-hmac-sha256!!
      WEATHER_API_KEY: uapi-j5jky0ggkSIABn-OreTfovNhfyEPDVRewQ3BgEBQ
    ports:
      - "8080:8080"
    volumes:
      - plugin-data:/app/plugins
      - screenshot-data:/app/screenshots
      - upload-data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Nginx 反向代理 + 静态资源 ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: island-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - web-admin-dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:443"]
      interval: 30s
      timeout: 5s
      retries: 3

# ==================== 持久化卷 ====================
volumes:
  mariadb-data:
  redis-data:
  plugin-data:
  screenshot-data:
  upload-data:
  web-admin-dist:

networks:
  default:
    name: island-network
